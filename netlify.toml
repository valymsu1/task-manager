[build]
  command = "npm install && cd ../frontend && npm install && npm run build"
  functions = "backend"
  publish = "frontend/build"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/server-netlify/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
